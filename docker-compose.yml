version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bike_sharing_db
    restart: always
    environment:
      POSTGRES_DB: bikesharing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bike_sharing_backend
    restart: always
    ports:
      - "8036:8036"
    env_file:
      - .env
    environment:
      # In the docker-compose network, connect to 'db' service instead of 'localhost'
      - DB_HOST=db
    volumes:
      - mock_s3_data:/app/mock_s3_bucket
      - trained_models:/app/models
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bike_sharing_frontend
    restart: always
    ports:
      - "8018:8018"
    depends_on:
      - backend

volumes:
  postgres_data:
  mock_s3_data:
  trained_models:
